name: Dev Publish

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-check:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      setup-script: "sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev"
