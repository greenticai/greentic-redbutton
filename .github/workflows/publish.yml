name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - id: version
        name: Extract Cargo.toml version
        run: echo "version=$(python3 ci/release_version.py)" >> "$GITHUB_OUTPUT"
      - id: tag
        name: Resolve release tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check tag matches version
        run: |
          expected="v${{ steps.version.outputs.version }}"
          actual="${{ steps.tag.outputs.tag }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "tag mismatch: expected $expected, got $actual" >&2
            exit 1
          fi
      - name: Run local check
        run: bash ci/local_check.sh

  publish-crates:
    runs-on: ubuntu-24.04
    needs: verify
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required" >&2
            exit 1
          fi

          while IFS= read -r crate; do
            [[ -n "$crate" ]] || continue
            cargo publish -p "$crate" --dry-run
            attempt=1
            until cargo publish -p "$crate"; do
              if [[ "$attempt" -ge 3 ]]; then
                echo "failed to publish $crate after $attempt attempts" >&2
                exit 1
              fi
              sleep $(( attempt * 10 ))
              attempt=$(( attempt + 1 ))
            done
            sleep 15
          done < <(python3 ci/publishable_crates.py)

  binstall-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive_ext: zip
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runner: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        shell: bash
        run: cargo build --release --locked
      - name: Package artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.verify.outputs.version }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          bin_name="greentic-redbutton"
          bin_path="target/release/${bin_name}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            bin_path="${bin_path}.exe"
          fi

          staging="dist/${bin_name}-v${VERSION}-${TARGET}"
          mkdir -p "$staging"
          cp "$bin_path" "$staging/"
          cp README.md LICENSE "$staging/"

          archive="${staging}.${ARCHIVE_EXT}"
          python3 - "$staging" "$archive" "$ARCHIVE_EXT" <<'PY'
          import pathlib
          import sys
          import tarfile
          import zipfile

          staging = pathlib.Path(sys.argv[1])
          archive = pathlib.Path(sys.argv[2])
          ext = sys.argv[3]

          if ext == "zip":
              with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for path in staging.rglob("*"):
                      if path.is_file():
                          zf.write(path, path.relative_to(staging.parent))
          else:
              with tarfile.open(archive, "w:gz") as tf:
                  tf.add(staging, arcname=staging.name)
          PY
          python3 - "$archive" <<'PY'
          import hashlib
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          checksum_path = path.with_suffix(path.suffix + ".sha256")
          checksum_path.write_text(f"{digest}  {path.name}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: binstall-${{ matrix.target }}
          path: dist/*

  create-release:
    runs-on: ubuntu-24.04
    needs:
      - verify
      - publish-crates
      - binstall-build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: binstall-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/*
